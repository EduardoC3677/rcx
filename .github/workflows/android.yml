name: Android CI

on:
  workflow_dispatch:
  push:
    branches:
      - 'dev'
      - 'copilot/**'
  pull_request:
    branches:
      - 'copilot/**'

jobs:
  build-all:

    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin' 
        java-version: 17
    - name: Set up Go 1.22
      uses: actions/setup-go@v6
      with:
        go-version: '1.22'
      id: go
    - name: Force NDK version
      run: echo "y" | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "ndk;27.3.13750724"
    - name: Build rclone
      run: ./gradlew rclone:buildNative
    - name: Build app
      run: ./gradlew assembleOssDebug
    - name: Upload APK (arm)
      uses: actions/upload-artifact@v4
      with:
        name: arm.apk
        path: app/build/outputs/apk/oss/debug/app-oss-armeabi-v7a-debug.apk
        retention-days: 3
    - name: Upload APK (arm64)
      uses: actions/upload-artifact@v4
      with:
        name: arm64.apk
        path: app/build/outputs/apk/oss/debug/app-oss-arm64-v8a-debug.apk
        retention-days: 3
    - name: Upload APK (x86)
      uses: actions/upload-artifact@v4
      with:
        name: x86.apk
        path: app/build/outputs/apk/oss/debug/app-oss-x86-debug.apk
        retention-days: 3
    - name: Upload APK (arm)
      uses: actions/upload-artifact@v4
      with:
        name: x64.apk
        path: app/build/outputs/apk/oss/debug/app-oss-x86_64-debug.apk
        retention-days: 3
    - name: Upload APK (universal)
      uses: actions/upload-artifact@v4
      with:
        name: universal.apk
        path: app/build/outputs/apk/oss/debug/app-oss-universal-debug.apk
        retention-days: 14
